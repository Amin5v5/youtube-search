name: 'جستجوی یوتیوب با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثال: ytsearch10:آموزش پایتون)'
        required: true
        default: 'ytsearch10:فیلم جدید'
      max_results:
        description: 'تعداد نتایج'
        required: true
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install yt-dlp

      - name: دریافت اطلاعات از یوتیوب
        run: |
          MAX=${{ github.event.inputs.max_results }}
          QUERY="${{ github.event.inputs.query }}"
          if [[ ! "$QUERY" =~ ^ytsearch[0-9]*: ]]; then
            QUERY="ytsearch${MAX}:${QUERY}"
          fi
          echo "جستجو: $QUERY"
          yt-dlp --flat-playlist --dump-json --playlist-end "$MAX" "$QUERY" > data.json || echo "[]" > data.json

      - name: اجرای اسکریپت ساخت HTML
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_youtube_html.py

      - name: ذخیره در پوشه history (اصلاح‌شده با پایتون)
        run: |
          QUERY="${{ github.event.inputs.query }}"
          DATE_PART=$(date +'%Y.%m.%d')
          # پایتون: حذف پیشوند ytsearch و ساخت نام تمیز فارسی
          SANITIZED=$(python3 -c "
          import re, sys
          q = sys.argv[1]
          # حذف ytsearchN: از ابتدا
          q = re.sub(r'^ytsearch\d*:', '', q)
          # جایگزینی فاصله و کاراکترهای غیرمجاز با _
          q = re.sub(r'[^\w\s]', '', q).strip()
          q = re.sub(r'\s+', '_', q)
          # محدود کردن طول
          print(q[:40])
          " "$QUERY")
          
          BASE_DIR="history/YouTube/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          
          if [ -f search_results/index.html ]; then
            cp search_results/index.html "$DIR/"
          else
            echo "<html><body><h1>خطا: فایل HTML ساخته نشد</h1></body></html>" > "$DIR/index.html"
          fi
          if [ -f data.json ]; then
            cp data.json "$DIR/"
          else
            echo "[]" > "$DIR/data.json"
          fi
          echo "ذخیره در $DIR"

      - name: ذخیره و آپلود نتایج
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/ data.json history/ 2>/dev/null || true
          git commit -m "نتایج جستجوی یوتیوب: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
