name: 'جستجوی یوتیوب با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثال: ytsearch10:آموزش پایتون)'
        required: true
        default: 'ytsearch10:فیلم جدید'
      max_results:
        description: 'تعداد نتایج'
        required: true
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # رفع اخطار Node.js 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install yt-dlp

      - name: دریافت اطلاعات از یوتیوب
        run: |
          MAX=${{ github.event.inputs.max_results }}
          QUERY="${{ github.event.inputs.query }}"
          if [[ ! "$QUERY" =~ ^ytsearch[0-9]*: ]]; then
            QUERY="ytsearch${MAX}:${QUERY}"
          fi
          echo "جستجو: $QUERY"
          yt-dlp --flat-playlist --dump-json --playlist-end "$MAX" "$QUERY" > data.json || echo "[]" > data.json

      - name: اجرای اسکریپت ساخت HTML
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_html.py

      - name: ذخیره در پوشه history (تاریخ نقطه‌گذاری شده + جلوگیری از تکراری)
        run: |
          # حذف پیشوند ytsearchN: از عبارت جستجو
          CLEAN_QUERY=$(echo "${{ github.event.inputs.query }}" | sed -E 's/^ytsearch[0-9]*://')
          # جایگزینی کاراکترهای غیرمجاز با خط تیره
          SANITIZED=$(echo "$CLEAN_QUERY" | tr ' ' '_' | tr -cd 'a-zA-Z0-9آ-ی۰-۹_' | cut -c1-40)
          # تاریخ به صورت 2026.05.13
          DATE_PART=$(date +'%Y.%m.%d')
          # نام پوشه اصلی
          BASE_DIR="history/YouTube/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          # اگر پوشه وجود داشت، شماره اضافه کن
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          cp search_results/index.html "$DIR/"
          cp data.json "$DIR/"
          echo "ذخیره در $DIR"

      - name: ذخیره و آپلود نتایج
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/index.html data.json history/
          git commit -m "نتایج جستجوی یوتیوب: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
