name: 'جستجوی یوتیوب با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثال: ytsearch10:آموزش پایتون)'
        required: true
        default: 'ytsearch10:فیلم جدید'
      max_results:
        description: 'تعداد نتایج'
        required: true
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install yt-dlp

      - name: دریافت اطلاعات از یوتیوب
        run: |
          MAX=${{ github.event.inputs.max_results }}
          QUERY="${{ github.event.inputs.query }}"
          if [[ ! "$QUERY" =~ ^ytsearch[0-9]*: ]]; then
            QUERY="ytsearch${MAX}:${QUERY}"
          fi
          echo "جستجو: $QUERY"
          yt-dlp --flat-playlist --dump-json --playlist-end "$MAX" "$QUERY" | \
            jq -c '{title, webpage_url, thumbnail, duration, view_count, uploader}' > data.json || echo "[]" > data.json

      - name: اجرای اسکریپت ساخت HTML
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_html.py

      - name: ذخیره و آپلود نتایج
        run: |
          cp search_results/index.html ./index.html
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/index.html index.html data.json generate_html.py
          git commit -m "نتایج جستجو: ${{ github.event.inputs.query }}" || echo "هیچ تغییری لازم نیست"
          git push
