name: 'جستجوی گوگل‌پلی با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثلاً: after motion z+)'
        required: true
        default: ''
      max_results:
        description: 'تعداد نتایج'
        required: true
        type: choice
        options:
          - '10'
          - '20'
          - '30'
          - '50'
          - '100'
        default: '10'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            search_results/
            history/
            generate_googleplay_html.py

      - name: نصب کتابخانه گوگل‌پلی
        run: pip install google-play-scraper

      - name: دریافت اطلاعات کامل از گوگل‌پلی (شامل حجم APK)
        run: |
          python3 << 'EOF'
          import json, sys, time
          from google_play_scraper import search, app

          query = "${{ github.event.inputs.query }}"
          max_results = int("${{ github.event.inputs.max_results }}")

          # تابع دریافت اطلاعات دقیق اپلیکیشن با آیدی
          def get_app_details(app_id, lang='fa', country='ir', retries=2):
              for attempt in range(retries):
                  try:
                      details = app(app_id, lang=lang, country=country)
                      return {
                          'title': details.get('title'),
                          'developer': details.get('developer'),
                          'appId': app_id,
                          'score': details.get('score'),
                          'installs': details.get('installs'),
                          'icon': details.get('icon'),
                          'url': f"https://play.google.com/store/apps/details?id={app_id}",
                          'size': details.get('size', 'نامشخص'),
                          'version': details.get('version', 'نامشخص'),
                          'updated': details.get('updated', None)
                      }
                  except:
                      if attempt < retries - 1:
                          time.sleep(1)
                      else:
                          return None

          # مرحله ۱: جستجو
          print(f"جستجوی عبارت: {query}")
          try:
              search_results = search(query, n_hits=max_results, lang='fa', country='ir')
          except Exception as e:
              print(f"خطا در جستجو: {e}", file=sys.stderr)
              search_results = []

          # مرحله ۲: دریافت اطلاعات کامل هر اپلیکیشن (برای حجم و جزئیات)
          apps = []
          for item in search_results:
              app_id = item.get('appId')
              if app_id:
                  details = get_app_details(app_id, lang='fa', country='ir')
                  if details:
                      apps.append(details)
                      print(f"✅ دریافت اطلاعات: {details['title']} - حجم: {details['size']}")
                  time.sleep(0.5)  # تأخیر کوتاه برای جلوگیری از مسدود شدن
              else:
                  # اگر appId وجود نداشت، همان اطلاعات سطحی را نگه دار
                  apps.append({
                      'title': item.get('title'),
                      'developer': item.get('developer'),
                      'appId': '',
                      'score': item.get('score'),
                      'installs': item.get('installs'),
                      'icon': item.get('icon'),
                      'url': item.get('url'),
                      'size': 'نامشخص',
                      'version': 'نامشخص'
                  })

          # ذخیره در فایل JSON (هر خط یک اپلیکیشن)
          with open('data_play.json', 'w', encoding='utf-8') as f:
              for app_info in apps:
                  f.write(json.dumps(app_info, ensure_ascii=False) + '\n')

          print(f"✅ تعداد نتایج نهایی: {len(apps)}")
          EOF

      - name: اجرای اسکریپت ساخت HTML (نمایش حجم و لینک دانلود ساده)
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_googleplay_html.py

      - name: ذخیره در پوشه history با نام پویا
        run: |
          QUERY="${{ github.event.inputs.query }}"
          DATE_PART=$(date +'%Y.%m.%d')
          SANITIZED=$(python3 -c "
          import re, sys
          q = sys.argv[1]
          q = re.sub(r'[^\w\s]', '', q).strip()
          q = re.sub(r'\s+', '_', q)
          if not q:
              q = 'جستجو'
          print(q[:40])
          " "$QUERY")
          
          BASE_DIR="history/GooglePlay/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          
          if [ -f search_results/googleplay/index.html ]; then
            cp search_results/googleplay/index.html "$DIR/"
          else
            echo "<html><body><h1>خطا: فایل HTML ساخته نشد</h1></body></html>" > "$DIR/index.html"
          fi
          if [ -f data_play.json ]; then
            cp data_play.json "$DIR/"
          else
            echo "[]" > "$DIR/data_play.json"
          fi
          echo "ذخیره در $DIR"
          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: نمایش لینک مستقیم به فایل HTML این جستجو
        run: |
          ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ env.DIR }}', safe='/'))")
          echo "### 📁 نتایج این جستجو:" >> $GITHUB_STEP_SUMMARY
          echo "[مشاهده صفحه نتایج](https://github.com/${{ github.repository }}/blob/main/${ENCODED_DIR}/index.html)" >> $GITHUB_STEP_SUMMARY
          echo "[دانلود فایل JSON داده‌ها](https://github.com/${{ github.repository }}/blob/main/${ENCODED_DIR}/data_play.json)" >> $GITHUB_STEP_SUMMARY

      - name: ذخیره و آپلود نتایج در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/ data_play.json history/ 2>/dev/null || true
          git commit -m "نتایج جستجوی گوگل‌پلی: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
