name: 'جستجوی گوگل‌پلی با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثلاً: تلگرام)'
        required: true
        default: 'بازی'
      max_results:
        description: 'تعداد نتایج'
        required: true
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: نصب کتابخانۀ گوگل‌پلی
        run: pip install google-play-scraper

      - name: دریافت اطلاعات از گوگل‌پلی
        run: |
          python3 << 'EOF'
          import json, sys
          from google_play_scraper import search

          query = "${{ github.event.inputs.query }}"
          max_results = int("${{ github.event.inputs.max_results }}")

          try:
              results = search(query, n_hits=max_results, lang='fa', country='ir')
          except Exception as e:
              print(f"خطا: {e}", file=sys.stderr)
              results = []

          with open('data_play.json', 'w', encoding='utf-8') as f:
              for app in results:
                  f.write(json.dumps(app, ensure_ascii=False) + '\n')

          print(f"✅ تعداد نتایج: {len(results)}")
          EOF

      - name: اجرای اسکریپت ساخت HTML
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_googleplay_html.py

      - name: ذخیره در پوشه history (دقیقاً مانند یوتیوب)
        run: |
          QUERY="${{ github.event.inputs.query }}"
          DATE_PART=$(date +'%Y.%m.%d')
          
          # پایتون: ساخت نام تمیز فارسی (همان منطق یوتیوب)
          SANITIZED=$(python3 -c "
          import re, sys
          q = sys.argv[1]
          # فقط کاراکترهای مجاز فارسی/انگلیسی/عدد و فاصله نگه داشته، بقیه حذف
          q = re.sub(r'[^\w\s]', '', q).strip()
          q = re.sub(r'\s+', '_', q)
          # اگر خالی ماند، یک نام پیش‌فرض بگذار
          if not q:
              q = 'جستجو'
          print(q[:40])
          " "$QUERY")
          
          BASE_DIR="history/GooglePlay/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          
          # کپی فایل‌ها (در صورت وجود)
          if [ -f search_results/googleplay/index.html ]; then
            cp search_results/googleplay/index.html "$DIR/"
          else
            echo "<html><body><h1>خطا: فایل HTML ساخته نشد</h1></body></html>" > "$DIR/index.html"
          fi
          if [ -f data_play.json ]; then
            cp data_play.json "$DIR/"
          else
            echo "[]" > "$DIR/data_play.json"
          fi
          echo "ذخیره در $DIR"

      - name: ذخیره و آپلود نتایج
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/ data_play.json history/ 2>/dev/null || true
          git commit -m "نتایج جستجوی گوگل‌پلی: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
