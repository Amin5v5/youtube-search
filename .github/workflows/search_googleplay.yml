name: 'جستجوی گوگل‌پلی با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثلاً: تلگرام)'
        required: true
        default: ''
      max_results:
        description: 'تعداد نتایج'
        required: true
        type: choice
        options:
          - '10'
          - '20'
          - '30'
          - '50'
        default: '10'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: نصب کتابخانه گوگل‌پلی
        run: pip install google-play-scraper

      - name: دریافت اطلاعات از گوگل‌پلی (شامل حجم)
        run: |
          python3 << 'EOF'
          import json, sys, time
          from google_play_scraper import search, app

          query = "${{ github.event.inputs.query }}"
          max_results = int("${{ github.event.inputs.max_results }}")

          # مرحله 1: جستجو
          try:
              results = search(query, n_hits=max_results, lang='fa', country='ir')
          except Exception as e:
              print(f"خطا در جستجو: {e}", file=sys.stderr)
              results = []

          # مرحله 2: دریافت جزئیات کامل (به ویژه حجم) برای هر نتیجه
          apps = []
          for item in results:
              app_id = item.get('appId')
              if not app_id:
                  continue
              # تلاش برای دریافت اطلاعات دقیق
              for attempt in range(3):
                  try:
                      details = app(app_id, lang='fa', country='ir')
                      apps.append({
                          "title": details.get("title", "بدون نام"),
                          "developer": details.get("developer", "نامشخص"),
                          "appId": app_id,
                          "score": details.get("score", 0),
                          "installs": details.get("installs", "نامشخص"),
                          "icon": details.get("icon", ""),
                          "url": f"https://play.google.com/store/apps/details?id={app_id}",
                          "size": details.get("size", "نامشخص")
                      })
                      break
                  except Exception as e:
                      print(f"⚠️ تلاش {attempt+1} برای {app_id} ناموفق: {e}", file=sys.stderr)
                      if attempt == 2:
                          # در صورت شکست نهایی، اطلاعات سطحی را ذخیره کن (بدون حجم)
                          apps.append({
                              "title": item.get("title", "بدون نام"),
                              "developer": item.get("developer", "نامشخص"),
                              "appId": app_id,
                              "score": item.get("score", 0),
                              "installs": item.get("installs", "نامشخص"),
                              "icon": item.get("icon", ""),
                              "url": item.get("url", ""),
                              "size": "نامشخص"
                          })
                      time.sleep(2)
              time.sleep(0.5)  # تأخیر بین برنامه‌ها

          # ذخیره در فایل JSON
          with open('data_play.json', 'w', encoding='utf-8') as f:
              for app_info in apps:
                  f.write(json.dumps(app_info, ensure_ascii=False) + '\n')

          print(f"✅ تعداد نتایج با جزئیات کامل: {len(apps)}")
          EOF

      - name: اجرای اسکریپت ساخت HTML (نمایش حجم)
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_googleplay_html.py

      - name: ذخیره در پوشه history
        run: |
          QUERY="${{ github.event.inputs.query }}"
          DATE_PART=$(date +'%Y.%m.%d')
          SANITIZED=$(python3 -c "
          import re, sys
          q = sys.argv[1]
          q = re.sub(r'[^\w\s]', '', q).strip()
          q = re.sub(r'\s+', '_', q)
          if not q:
              q = 'جستجو'
          print(q[:40])
          " "$QUERY")
          
          BASE_DIR="history/GooglePlay/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          
          if [ -f search_results/googleplay/index.html ]; then
            cp search_results/googleplay/index.html "$DIR/"
          else
            echo "<html><body><h1>خطا: فایل HTML ساخته نشد</h1></body></html>" > "$DIR/index.html"
          fi
          if [ -f data_play.json ]; then
            cp data_play.json "$DIR/"
          else
            echo "[]" > "$DIR/data_play.json"
          fi
          echo "ذخیره در $DIR"
          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: نمایش لینک فایل HTML و لینک دانلود مستقیم JSON
        run: |
          ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ env.DIR }}', safe='/'))")
          echo "### 📁 نتایج این جستجو:" >> $GITHUB_STEP_SUMMARY
          echo "[➡️ مشاهده فایل جستجو](https://github.com/${{ github.repository }}/blob/main/${ENCODED_DIR}/index.html)" >> $GITHUB_STEP_SUMMARY
          JSON_RAW_URL="https://github.com/${{ github.repository }}/raw/main/${ENCODED_DIR}/data_play.json"
          echo "[⬇️ دانلود این جستجو](${JSON_RAW_URL})" >> $GITHUB_STEP_SUMMARY

      - name: ذخیره و آپلود نتایج
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/ data_play.json history/ 2>/dev/null || true
          git commit -m "نتایج جستجوی گوگل‌پلی: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
