### تغییرات کلیدی که اعمال کردم:
1.  **مدیریت خطا:** اضافه کردن دستورات شرطی برای چک کردن وجود فایل.
2.  **بهبود `apkeep`:** اضافه کردن قابلیت استفاده از کوکی (بسیار حیاتی).
3.  **اصلاح منطق `zip`:** در نسخه جدید، اگر `max_part_mb` وارد شود، از قابلیت `-s` استفاده شده و فایل‌های خروجی (که شامل `.z01` و غیره هستند) همگی به پوشه مقصد منتقل می‌شوند.
4.  **فیلتر معماری ساده‌تر:** به جای پیچیدگی زیاد، فایل‌هایی که معماری آن‌ها با ورودی کاربر یکی نیست را حذف می‌کنیم.
5.  **رفع مشکل پوشه‌بندی:** ساختار `git add` را به `downloads/` تغییر دادم تا کل پوشه مدیریت شود.

### ⚠️ مرحله حیاتی برای شما (بدون این مرحله کار نمی‌کند):
گوگل‌پلی اجازه دانلود مستقیم از سرورهای گیت‌هاب را نمی‌دهد. شما باید:
1.  در مرورگر خود (Chrome) وارد اکانت گوگل شوید.
2.  افزونه **Get cookies.txt LOCALLY** را نصب کنید.
3.  در گوگل‌پلی، کوکی‌ها را اکسپورت کنید و متن آن را کپی کنید.

در مخزن گیت‌هاب خود به مسیر Settings > Secrets and variables > Actions بروید.
یک `New repository secret` بسازید:
   Name: `GPLAY_COOKIES`
   Value: (همان متن کوکی که کپی کردید)
