name: '🔍 جستجوی گوگل‌پلی'

on:
  workflow_dispatch:
    inputs:
      query:
        description: '🎯 عبارت جستجو (مثلاً: after motion z+)'
        required: true
        default: ''
      max_results:
        description: '📊 تعداد نتایج'
        required: true
        type: choice
        options:
          - '10'
          - '20'
          - '30'
        default: '10'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⚡️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none

      - name: 🐍 نصب کتابخانه
        run: pip install google-play-scraper

      - name: 🎯 جستجو و دریافت جزئیات کامل (بهبودیافته)
        run: |
          import json, sys, time
          from google_play_scraper import search, app

          query = "${{ github.event.inputs.query }}"
          target_count = int("${{ github.event.inputs.max_results }}")

          # شکستن عبارت به کلمات کلیدی
          keywords = query.split()
          all_results = []
          seen_ids = set()

          for kw in keywords:
              if len(kw) < 2:
                  continue
              try:
                  results = search(kw, n_hits=target_count, lang='fa', country='ir')
                  for item in results:
                      app_id = item.get('appId')
                      if app_id and app_id not in seen_ids:
                          all_results.append(item)
                          seen_ids.add(app_id)
              except:
                  pass
              time.sleep(1)

          # اگر هیچ نتیجه‌ای با کلمات جداگانه پیدا نشد، کل عبارت را جستجو کن
          if not all_results:
              try:
                  all_results = search(query, n_hits=target_count, lang='fa', country='ir')
              except:
                  pass

          # دریافت اطلاعات کامل (حجم و ...)
          apps = []
          for item in all_results[:target_count*2]:
              app_id = item.get('appId')
              if not app_id:
                  continue
              try:
                  details = app(app_id, lang='fa', country='ir')
                  apps.append({
                      "title": details.get("title", "بدون نام"),
                      "developer": details.get("developer", "نامشخص"),
                      "appId": app_id,
                      "score": details.get("score", 0),
                      "installs": details.get("installs", "نامشخص"),
                      "icon": details.get("icon", ""),
                      "url": f"https://play.google.com/store/apps/details?id={app_id}",
                      "size": details.get("size", "نامشخص"),
                      "version": details.get("version", "نامشخص"),
                      "updated": details.get("updated", None)
                  })
              except:
                  # اگر نتواست اطلاعات کامل بگیرد، همان اطلاعات سطحی را نگه دار
                  apps.append({
                      "title": item.get("title", "بدون نام"),
                      "developer": item.get("developer", "نامشخص"),
                      "appId": app_id,
                      "score": item.get("score", 0),
                      "installs": item.get("installs", "نامشخص"),
                      "icon": item.get("icon", ""),
                      "url": item.get("url", ""),
                      "size": "نامشخص",
                      "version": "نامشخص",
                      "updated": None
                  })
              time.sleep(0.5)
              if len(apps) >= target_count:
                  break

          # ذخیره در JSON
          with open('data_play.json', 'w', encoding='utf-8') as f:
              for app_info in apps:
                  f.write(json.dumps(app_info, ensure_ascii=False) + '\n')

          print(f"✅ {len(apps)} برنامه یافت شد.")

      - name: 🌐 ساخت HTML نتایج
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_googleplay_html.py

      - name: 📁 ذخیره در پوشه history
        run: |
          QUERY="${{ github.event.inputs.query }}"
          DATE_PART=$(date +'%Y.%m.%d')
          SANITIZED=$(python3 -c "
          import re, sys
          q = sys.argv[1]
          q = re.sub(r'[^\w\s]', '', q).strip()
          q = re.sub(r'\s+', '_', q)
          if not q:
              q = 'جستجو'
          print(q[:40])
          " "$QUERY")
          
          BASE_DIR="history/GooglePlay/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          
          if [ -f search_results/googleplay/index.html ]; then
            cp search_results/googleplay/index.html "$DIR/"
          else
            echo "<html><body><h1>خطا: فایل HTML ساخته نشد</h1></body></html>" > "$DIR/index.html"
          fi
          if [ -f data_play.json ]; then
            cp data_play.json "$DIR/"
          else
            echo "[]" > "$DIR/data_play.json"
          fi
          echo "ذخیره در $DIR"
          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: 🔗 نمایش لینک نتایج
        run: |
          ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ env.DIR }}', safe='/'))")
          echo "### 📁 نتایج این جستجو:" >> $GITHUB_STEP_SUMMARY
          echo "[➡️ مشاهده صفحه نتایج](https://github.com/${{ github.repository }}/blob/main/${ENCODED_DIR}/index.html)" >> $GITHUB_STEP_SUMMARY
          JSON_RAW_URL="https://github.com/${{ github.repository }}/raw/main/${ENCODED_DIR}/data_play.json"
          echo "[⬇️ دانلود مستقیم نتایج (JSON)](${JSON_RAW_URL})" >> $GITHUB_STEP_SUMMARY

      - name: 💾 ذخیره و آپلود
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/ data_play.json history/
          git commit -m "نتایج جستجو: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
