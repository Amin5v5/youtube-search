name: 'جستجوی گوگل‌پلی با HTML'

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو (مثلاً: تلگرام)'
        required: true
        default: ''
      max_results:
        description: 'تعداد نتایج'
        required: true
        default: '10'
        type: choice
        options:
          - '10'
          - '20'
          - '30'
          - '50'
          - '100'
      category:
        description: 'دسته‌بندی'
        required: false
        default: 'any'
        type: choice
        options:
          - 'any (همه)'
          - 'GAME (بازی)'
          - 'PRODUCTIVITY (بهره‌وری)'
          - 'SOCIAL (اجتماعی)'
          - 'EDUCATION (آموزش)'
          - 'ENTERTAINMENT (سرگرمی)'
          - 'TOOLS (ابزارها)'
          - 'COMMUNICATION (ارتباطی)'
          - 'HEALTH_AND_FITNESS (سلامت)'
          - 'TRAVEL_AND_LOCAL (سفر و محلی)'
          - 'FINANCE (مالی)'
          - 'PHOTOGRAPHY (عکاسی)'
          - 'NEWS_AND_MAGAZINES (اخبار)'
          - 'SHOPPING (خرید)'
          - 'BOOKS_AND_REFERENCE (کتاب)'
          - 'BUSINESS (کسب‌وکار)'
          - 'COMICS (کمیک)'
          - 'LIFESTYLE (سبک زندگی)'
          - 'PERSONALIZATION (شخصی‌سازی)'
          - 'SPORTS (ورزش)'
          - 'WEATHER (آب‌وهوا)'
          - 'FAMILY (خانوادگی)'
          - 'MEDICAL (پزشکی)'
          - 'MUSIC_AND_AUDIO (موسیقی)'
          - 'VIDEO_PLAYERS (پخش ویدیو)'
          - 'MAPS_AND_NAVIGATION (نقشه)'
          - 'AUTO_AND_VEHICLES (خودرو)'
          - 'BEAUTY (زیبایی)'
          - 'DATING (قرار عاشقانه)'
          - 'EVENTS (رویدادها)'
          - 'FOOD_AND_DRINK (غذا و نوشیدنی)'
          - 'HOUSE_AND_HOME (خانه)'
          - 'LIBRARIES_AND_DEMO (کتابخانه)'
          - 'PARENTING (والدین)'
          - 'ART_AND_DESIGN (هنر و طراحی)'
      min_rating:
        description: 'حداقل امتیاز'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '3.0'
          - '3.5'
          - '4.0'
          - '4.5'
      price:
        description: 'قیمت'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all (همه)'
          - 'free (رایگان)'
          - 'paid (پولی)'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: نصب کتابخانه گوگل‌پلی
        run: pip install google-play-scraper

      - name: دریافت اطلاعات از گوگل‌پلی
        run: |
          python3 << 'EOF'
          import json, sys
          from google_play_scraper import search

          query = "${{ github.event.inputs.query }}"
          max_results = int("${{ github.event.inputs.max_results }}")
          category = "${{ github.event.inputs.category }}"
          min_rating = "${{ github.event.inputs.min_rating }}"
          price = "${{ github.event.inputs.price }}"

          # استخراج کد دسته‌بندی (قسمت انگلیسی قبل از پرانتز)
          cat_code = category.split(' ')[0] if category != 'any (همه)' else None

          kwargs = {}
          if cat_code and cat_code != 'any':
              kwargs['cat'] = cat_code
          if min_rating != '0':
              kwargs['score'] = float(min_rating)
          if price == 'free (رایگان)':
              kwargs['free'] = True
          elif price == 'paid (پولی)':
              kwargs['free'] = False

          try:
              results = search(query, n_hits=max_results, lang='fa', country='ir', **kwargs)
          except Exception as e:
              print(f"خطا: {e}", file=sys.stderr)
              results = []

          with open('data_play.json', 'w', encoding='utf-8') as f:
              for app in results:
                  f.write(json.dumps(app, ensure_ascii=False) + '\n')

          print(f"✅ تعداد نتایج: {len(results)}")
          EOF

      - name: اجرای اسکریپت ساخت HTML
        env:
          REPO: ${{ github.repository }}
        run: python3 generate_googleplay_html.py

      - name: ذخیره در پوشه history
        run: |
          QUERY="${{ github.event.inputs.query }}"
          DATE_PART=$(date +'%Y.%m.%d')
          SANITIZED=$(python3 -c "
          import re, sys
          q = sys.argv[1]
          q = re.sub(r'[^\w\s]', '', q).strip()
          q = re.sub(r'\s+', '_', q)
          if not q:
              q = 'جستجو'
          print(q[:40])
          " "$QUERY")
          
          BASE_DIR="history/GooglePlay/${DATE_PART} - ${SANITIZED}"
          DIR="$BASE_DIR"
          COUNTER=1
          while [ -d "$DIR" ]; do
            DIR="${BASE_DIR}_${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          mkdir -p "$DIR"
          
          if [ -f search_results/googleplay/index.html ]; then
            cp search_results/googleplay/index.html "$DIR/"
          else
            echo "<html><body><h1>خطا: فایل HTML ساخته نشد</h1></body></html>" > "$DIR/index.html"
          fi
          if [ -f data_play.json ]; then
            cp data_play.json "$DIR/"
          else
            echo "[]" > "$DIR/data_play.json"
          fi
          echo "ذخیره در $DIR"
          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: رمزگذاری مسیر و نمایش لینک به فایل این جستجو
        run: |
          ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ env.DIR }}', safe='/'))")
          echo "### 📁 فایل این جستجو:" >> $GITHUB_STEP_SUMMARY
          echo "[مشاهده فایل](https://github.com/${{ github.repository }}/blob/main/${ENCODED_DIR}/index.html)" >> $GITHUB_STEP_SUMMARY

      - name: ذخیره و آپلود نتایج
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add search_results/ data_play.json history/ 2>/dev/null || true
          git commit -m "نتایج جستجوی گوگل‌پلی: ${{ github.event.inputs.query }}" || echo "هیچ تغییری نبود"
          git push
